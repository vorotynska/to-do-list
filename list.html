<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors Game</title>
    <link rel="stylesheet" href="./list.css">
    <script src="./list.js" defer></script>
</head>
<body>
  <div class="app">
    <h1>My Task</h1>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Enter a task">
      <button type="button" id="addBtn">Add</button>
    </div>

    <ol id="taskList"></ol>

    <div class="controls">
      <div class="filters">
        <button type="button" data-filter="all" class="filter active">All</button>
        <button type="button" data-filter="active" class="filter">Active</button>
        <button type="button" data-filter="completed" class="filter">Completed</button>
      </div>
      <button type="button" id="clearBtn" class="clearBtn">Clear completed</button>
    </div>
    
    <div class="info">
        <p id="all" class="info"></p>
        <p id="active" class="info"></p>
        <p id="completed" class="info"></p>
    </div>
  </div>
 
    <template id="taskTemplate">
      <li>
        <span class="taskText"></span>
        <button class="deleteBtn">Delete</button>
      </li>
    </template>
</body>
</html>
