<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, Paper, Scissors Game</title>
  <link rel="stylesheet" href="./list.css">
  <script src="./list.js" defer></script>
</head>

<body>
  <div class="app">
    <button type="button" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
    <h1>My Task</h1>

    <div class="input-group">
      <input type="text" name="search" id="searchInput" placeholder="Search tasks">
      <button type="button" id="clearSearch">Clear search</button>
    </div>

    <div class="input-group">
      <label for="taskInput">New task</label>
      <input type="text" id="taskInput" placeholder="Enter a task">
      <button type="button" id="addBtn">Add</button>
      <button type="button" id="clearInput">Clear Input</button>
    </div>

    <p id="errorMsg" class="error" aria-live="assertive"></p>

    <div class="progress">
      <div 
        id="progressBar"
        role="progressbar"
        title="Percentage of task completed"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
      ></div>
    </div>

    <ol id="taskList"></ol>

    <p id="emptyState" class="empty">No tasks yet</p>
    <p id="warning" class="warning" aria-live="polite"></p>

    <div class="controls">
      <div class="filters">
        <button type="button" data-filter="all" class="filter active">All</button>
        <button type="button" data-filter="active" class="filter">Active</button>
        <button type="button" data-filter="completed" class="filter">Completed</button>
      </div>
      <button type="button" id="clearBtn" class="clearBtn">Clear completed</button>
    </div>

    <div class="info">
      <p id="all" class="info" aria-live="polite"></p>
      <p id="active" class="info" aria-live="polite"></p>
      <p id="completed" class="info" aria-live="polite"></p>
    </div>

  </div>

  <template id="taskTemplate">
    <li>
      <input type="checkbox" name="" id="checkbox" class="checkbox">
      <span class="taskText"></span>
      <button class="deleteBtn">Delete</button>
    </li>
  </template>
</body>

</html>
